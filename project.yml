name: faBolus
options:
  bundleIdPrefix: com.fabolus
  createIntermediateGroups: true

# Build configuration is read from Config.xcconfig, which pulls in your personal,
# gitignored LocalConfig.xcconfig (copy it from LocalConfig.xcconfig.example).
# That's where APP_BUNDLE_ID and DEVELOPMENT_TEAM live — every identifier below is
# derived from $(APP_BUNDLE_ID), so setting your own is a one-line change.
configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

packages:
  faBolusCore:
    # Stable, pump/host-agnostic contracts + models (in-repo local package).
    path: Packages/faBolusCore
  G7SensorKit:
    # Dexcom G7/ONE+ BLE message decoders, vendored from LoopKit/G7SensorKit (MIT), LoopKit-free.
    path: Packages/G7SensorKit
  DexcomG6Kit:
    # Dexcom G5/G6/ONE passive glucose-message decoders, vendored from LoopKit/CGMBLEKit (MIT).
    path: Packages/DexcomG6Kit
  HistoryStore:
    # faBolus-owned persistent glucose/insulin/carb history (SwiftData) — powers TIR/plotting and
    # feeds the advisory tools. In-repo local package. See MIGRATION.md.
    path: Packages/HistoryStore
  ShareClient:
    # Dexcom Share follower core, vendored from LoopKit/dexcom-share-client-swift (MIT) — the
    # validated client Loop uses. Powers DexcomShareSource. See Phase 6 in MIGRATION.md.
    path: Packages/ShareClient
  faBolusNudge:
    # Advisory SDK (reusable, stateless): dosing-safety guardrails, hypo prediction, autotune/autosens,
    # insights, eating detection. Xcode auto-resolves this remote package on build. See MIGRATION.md.
    url: https://github.com/faBolus-app/faBolusNudge.git
    revision: c3d1e2284249e1667c8c17f37eeecb28c605d4a5
  PumpX2Kit:
    # Local path to Repo 1. Pin to a released version once PumpX2Kit tags v0.1.0.
    path: ../PumpX2Kit
  # >>> GARMIN (scripts/generate-project.sh strips this block when the SDK is absent)
  ConnectIQ:
    # Garmin Connect IQ Mobile SDK for iOS (binary xcframework). Not committed (Garmin
    # license). Place it where the docs describe. Path is relative to this repo.
    path: ../../vendor/connectiq-companion-app-sdk-ios-1.8.0
  # <<< GARMIN

targets:
  # iOS host app — owns the pump connection (PumpX2Kit) and the main HUD.
  faBolus:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ios/faBolus
      # WidgetBolusIntents belongs to the widget extensions only (the app uses WidgetBolusReceiver).
      - path: Shared
        excludes:
          - WidgetBolusIntents.swift
    dependencies:
      - package: faBolusCore
        product: faBolusCore
      - package: G7SensorKit
        product: G7SensorKit
      - package: DexcomG6Kit
        product: DexcomG6Kit
      - package: HistoryStore
        product: HistoryStore
      - package: ShareClient
        product: ShareClient
      - package: faBolusNudge
        product: DosingSafetyKit
      - package: faBolusNudge
        product: GlucoseIntelligenceKit
      - package: faBolusNudge
        product: TherapyInsightsKit
      - package: faBolusNudge
        product: AlertIntelligenceKit
      - package: faBolusNudge
        product: AutotuneKit
      - package: faBolusNudge
        product: EatingDetectionKit
      - package: faBolusNudge
        product: ModelCatalogKit
      - package: PumpX2Kit
        product: PumpX2Messages
      - package: PumpX2Kit
        product: PumpX2Auth
      - package: PumpX2Kit
        product: PumpX2BLE
      # >>> GARMIN (stripped by scripts/generate-project.sh when the SDK is absent)
      - package: ConnectIQ
        product: ConnectIQ
      # <<< GARMIN
      # Embeds the WidgetKit extension (Lock Screen + Home Screen widgets).
      - target: faBolusWidgets
      # >>> WATCH (stripped by scripts/generate-project.sh when FABOLUS_WATCH=0)
      # Embeds the watchOS companion app so it installs to the paired watch with the phone app.
      - target: faBolusWatch
        embed: true
      # <<< WATCH
    entitlements:
      path: ios/faBolus/faBolus.entitlements
      properties:
        # Shared container the app writes and the widgets read.
        com.apple.security.application-groups:
          - group.$(APP_BUNDLE_ID)
          # To read xDrip4iOS via its "Share to Loop" App Group, build + sign xDrip under the SAME
          # Apple Developer Team ID and uncomment the group matching xDrip's share type (App Groups
          # are team-scoped). $(DEVELOPMENT_TEAM) is substituted with your signing team at build.
          # See docs/operate/cgm-failover.md.
          # - group.com.$(DEVELOPMENT_TEAM).loopkit.LoopGroup                 # xDrip share type: Loop
          # - group.org.nightscout.$(DEVELOPMENT_TEAM).trio.trio-app-group   # xDrip share type: Trio
        # HealthKit (the Apple Health CGM source — xDrip4iOS in real time, or Eversense) is OPT-IN:
        # it needs the paid Apple Developer Program to enable the capability, so it's off by default
        # and the app builds/signs on a free account. To use it, uncomment the two keys below (and
        # enable HealthKit under Signing & Capabilities). See docs/operate/cgm-failover.md.
        # com.apple.developer.healthkit: true
        # com.apple.developer.healthkit.access: []
        # Automatic iCloud backup of app settings (Backup & restore) is OPT-IN for the same reason:
        # iCloud needs the paid Apple Developer Program. To enable auto-sync across your devices,
        # uncomment the key below AND add ICLOUD_SYNC to SWIFT_ACTIVE_COMPILATION_CONDITIONS. The
        # default file-based backup/restore works on a free account with no entitlement.
        # com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(APP_BUNDLE_ID)
    info:
      path: ios/faBolus/Info.plist
      properties:
        # App Group id (group.$(APP_BUNDLE_ID)) exposed to code so the shared-container store derives
        # it at runtime instead of hardcoding — stays correct if a self-compiler overrides APP_BUNDLE_ID.
        AppGroupIdentifier: group.$(APP_BUNDLE_ID)
        # Garmin Connect builds its "select devices for <app>" screen from CFBundleDisplayName.
        CFBundleDisplayName: faBolus
        # The Connect IQ BETA app id the phone pairs with (dashed UUID). Self-compilers who build their
        # own private beta set GARMIN_BETA_APP_ID in LocalConfig.xcconfig (see faBolusGarmin/scripts/
        # beta-build.sh). Defaults to the shared beta id via Config.xcconfig.
        GarminBetaAppID: $(GARMIN_BETA_APP_ID)
        # How Siri should pronounce/recognize the app name in App Shortcut phrases ("… in <name>").
        CFBundleSpokenName: "Fabolus"
        # iOS allows at most 3 alternative names.
        INAlternativeAppNames:
          - INAlternativeAppNameKey: "faBolus"
          - INAlternativeAppNameKey: "Pump Remote"
          - INAlternativeAppNameKey: "Fabolus"
        NSBluetoothAlwaysUsageDescription: "faBolus connects to your pump and (optionally) a CGM over Bluetooth to read status and deliver boluses."
        # Scan a host phone's pairing QR code when using this phone as a remote.
        NSCameraUsageDescription: "faBolus uses the camera to scan a pairing QR code when connecting to another phone as a remote."
        # Read glucose from Apple Health as a failover CGM feed (xDrip4iOS in real time, or Eversense).
        NSHealthShareUsageDescription: "faBolus can read glucose from Apple Health as a backup CGM feed (e.g. from xDrip4iOS or Eversense) when the pump's glucose is unavailable."
        # xDrip4iOS "Share to Loop" App Group ids (team substituted at build). Read by
        # XDripAppGroupSource — Loop and Trio share types; faBolus reads whichever group has data.
        LoopAppGroupIdentifier: group.com.$(DEVELOPMENT_TEAM).loopkit.LoopGroup
        TrioAppGroupIdentifier: group.org.nightscout.$(DEVELOPMENT_TEAM).trio.trio-app-group
        # Keep the pump BLE connection alive in the background (bluetooth-central), and act as a BLE
        # peripheral for the Mac remote (bluetooth-peripheral) so it works when locked/backgrounded.
        UIBackgroundModes: [bluetooth-central, bluetooth-peripheral]
        UILaunchScreen: {}
        # Garmin Connect IQ companion messaging: our custom callback scheme + querying the
        # Garmin Connect Mobile app.
        LSApplicationQueriesSchemes: [gcm-ciq]
        CFBundleURLTypes:
          - CFBundleURLName: $(APP_BUNDLE_ID).ciq
            CFBundleURLSchemes: [fabolusciq]
          # Deep links from the widgets (fabolus://bolus, fabolus://open).
          - CFBundleURLName: $(APP_BUNDLE_ID).deeplink
            CFBundleURLSchemes: [fabolus]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID)
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
      # Feature compile flags. Defaults enable Garmin (ConnectIQ) + the embedded Watch app;
      # scripts/generate-project.sh removes the GARMIN / WATCH_EMBEDDED tokens (and the package/embed
      # above) when the Garmin SDK is absent or FABOLUS_WATCH=0, so the app compiles without them.
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG GARMIN WATCH_EMBEDDED
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: GARMIN WATCH_EMBEDDED

  # watchOS companion app — embedded in the iPhone app so it installs to the paired watch with it.
  # (The glucose complication extension is temporarily NOT embedded: it needs the App Group
  # registered on the watch App IDs, which isn't done yet. Re-add faBolusWatchWidgets + the App
  # Group entitlement once that capability is enabled in Xcode.)
  faBolusWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - watch/faBolusWatch
      # WidgetBolusIntents belongs to the widget extensions only.
      - path: Shared
        excludes:
          - WidgetBolusIntents.swift
      # >>> ONWATCH_EATING (stripped by scripts/generate-project.sh unless FABOLUS_ONWATCH_EATING=1)
      # Bundle the eating model + manifest on the watch for the on-device path.
      - path: ios/faBolus/Models
      # <<< ONWATCH_EATING
    dependencies:
      # Embeds the watch-face complication extension (App Group now enabled on the watch App IDs).
      - target: faBolusWatchWidgets
      # Shared contracts (RemoteCommand/RemoteLink + models).
      - package: faBolusCore
        product: faBolusCore
      # Dexcom G7/ONE+ decoders for the watch's direct-BLE failover (Shared/DexcomG7BLESource).
      - package: G7SensorKit
        product: G7SensorKit
      # Direct-to-pump support (independent watch, Phase 1: pairing). PumpX2Kit builds for watchOS.
      - package: PumpX2Kit
        product: PumpX2Messages
      - package: PumpX2Kit
        product: PumpX2Auth
      - package: PumpX2Kit
        product: PumpX2BLE
      # >>> ONWATCH_EATING (stripped by scripts/generate-project.sh unless FABOLUS_ONWATCH_EATING=1)
      # On-device eating detector (EatingDetectionKit) + its model catalog. Needs HealthKit (below).
      - package: faBolusNudge
        product: EatingDetectionKit
      - package: faBolusNudge
        product: ModelCatalogKit
      # <<< ONWATCH_EATING
    entitlements:
      path: watch/faBolusWatch/faBolusWatch.entitlements
      properties:
        # Device-local container shared with the watch complication.
        com.apple.security.application-groups: [group.$(APP_BUNDLE_ID)]
        # HealthKit on the watch (read xDrip glucose from Apple Health, synced from the phone) is
        # OPT-IN like the phone — uncomment (and enable HealthKit under Signing & Capabilities) to use
        # the watchOS Apple Health failover. See docs/operate/cgm-failover.md.
        # com.apple.developer.healthkit: true
        # com.apple.developer.healthkit.access: []
        # >>> ONWATCH_EATING
        # On-device eating detection keeps sensing alive via an HKWorkoutSession → needs HealthKit.
        # This is the PAID-account requirement; generate-project.sh omits it unless the flag is on.
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        # <<< ONWATCH_EATING
    info:
      path: watch/faBolusWatch/Info.plist
      properties:
        AppGroupIdentifier: group.$(APP_BUNDLE_ID)
        CFBundleDisplayName: faBolus
        WKApplication: true
        # Marks this as the companion of the iPhone app so it installs alongside it.
        WKCompanionAppBundleIdentifier: $(APP_BUNDLE_ID)
        NSBluetoothAlwaysUsageDescription: "faBolus relays bolus commands to the iPhone app and can read a CGM directly over Bluetooth when the phone is out of range."
        # Read glucose from Apple Health (e.g. xDrip4iOS) as a phone-independent failover on the watch.
        NSHealthShareUsageDescription: "faBolus can read glucose from Apple Health as a backup CGM feed when your iPhone is out of range."
        # Keep a direct CGM (G7) BLE link alive in the background as a failover when the phone is unreachable.
        UIBackgroundModes: [bluetooth-central]
        # >>> ONWATCH_EATING (stripped unless FABOLUS_ONWATCH_EATING=1)
        # On-device eating sensing keeps CoreMotion alive via a workout session while sensing.
        WKBackgroundModes: [workout-processing]
        NSMotionUsageDescription: "faBolus senses wrist motion on-device to detect when you're likely eating, so it can remind you to bolus. Advisory only — it never doses."
        # <<< ONWATCH_EATING
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID).watch
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon   # watchOS won't install without an app icon
      # >>> ONWATCH_EATING (whole block stripped unless FABOLUS_ONWATCH_EATING=1, so the default
      # watch build is byte-identical to today — no flag, no HealthKit, free-account-safe)
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG FABOLUS_ONWATCH_EATING
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: FABOLUS_ONWATCH_EATING
      # <<< ONWATCH_EATING

  # watchOS widget extension — the glucose watch-face complication. Reads the snapshot the watch
  # app publishes to the shared App Group; never touches Bluetooth.
  faBolusWatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - watch/faBolusWatchWidgets
      - path: Shared/WidgetShared.swift
    info:
      path: watch/faBolusWatchWidgets/Info.plist
      properties:
        AppGroupIdentifier: group.$(APP_BUNDLE_ID)
        CFBundleDisplayName: faBolus
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: watch/faBolusWatchWidgets/faBolusWatchWidgets.entitlements
      properties:
        com.apple.security.application-groups: [group.$(APP_BUNDLE_ID)]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID).watch.widgets
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "4"

  # WidgetKit extension — Lock Screen (accessory) + Home Screen widgets + tap-to-bolus. Reads
  # the snapshot the app publishes to the shared App Group; never touches Bluetooth itself.
  faBolusWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ios/faBolusWidgets
      - path: Shared/WidgetShared.swift
      - path: Shared/WidgetBolusIntents.swift
    info:
      path: ios/faBolusWidgets/Info.plist
      properties:
        AppGroupIdentifier: group.$(APP_BUNDLE_ID)
        CFBundleDisplayName: faBolus
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: ios/faBolusWidgets/faBolusWidgets.entitlements
      properties:
        com.apple.security.application-groups: [group.$(APP_BUNDLE_ID)]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID).widgets
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"

  # macOS remote app — a remote for the iPhone host over Bluetooth LE (works when the phone is
  # locked/backgrounded). It never touches the pump: it displays the status the phone relays and sends
  # bolus/cancel/dismiss commands the phone executes. Menu-bar item + window.
  faBolusMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"   # interactive WidgetKit widgets + current MenuBarExtra
    sources:
      - mac/faBolusMac
      # Shared remote-client state machine + the App Group snapshot/store (portable, no BLE/HealthKit).
      - path: Shared/RemoteClientModel.swift
      - path: Shared/AuthenticatingRemoteClientModel.swift
      - path: Shared/WidgetShared.swift
      - path: Shared/DisplaySettings.swift
    dependencies:
      # Contracts + models + the BLE transport. No PumpX2Kit/ConnectIQ — it's a remote.
      - package: faBolusCore
        product: faBolusCore
      # Embeds the macOS WidgetKit extension.
      - target: faBolusMacWidgets
        embed: true
    entitlements:
      path: mac/faBolusMac/faBolusMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        # BLE central (connects to the iPhone peripheral) — works when the phone is locked/backgrounded.
        com.apple.security.device.bluetooth: true
        # Camera access to scan the pairing QR code. Required in the sandbox even with
        # NSCameraUsageDescription — without it AVCaptureDevice access is denied and the scanner is black.
        com.apple.security.device.camera: true
        com.apple.security.network.server: true
        # Shared container the app writes and the Mac widgets read. macOS App Groups are Team-ID
        # prefixed, so this uses $(TeamIdentifierPrefix) (unlike the iOS/watch group ids).
        com.apple.security.application-groups:
          - $(TeamIdentifierPrefix)group.$(APP_BUNDLE_ID)
    info:
      path: mac/faBolusMac/Info.plist
      properties:
        # Team-prefixed App Group id exposed to code (WidgetStore reads AppGroupIdentifier at runtime).
        AppGroupIdentifier: $(TeamIdentifierPrefix)group.$(APP_BUNDLE_ID)
        CFBundleDisplayName: faBolus
        # Menu-bar-only agent app: no Dock icon and no main window.
        LSUIElement: true
        # BLE is the transport to the iPhone (works when the phone is locked/backgrounded).
        NSBluetoothAlwaysUsageDescription: "faBolus connects to your iPhone over Bluetooth to show pump status and relay boluses, even when the phone is locked."
        NSCameraUsageDescription: "faBolus uses the camera to scan the pairing QR code shown on your iPhone."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID).mac
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic

  # macOS WidgetKit extension — Notification Center / desktop widgets + interactive quick-bolus.
  # Reads the snapshot the Mac app publishes to the shared App Group; never touches the network.
  faBolusMacWidgets:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - mac/faBolusMacWidgets
      - path: Shared/WidgetShared.swift
      - path: Shared/WidgetBolusIntents.swift
      - path: Shared/DisplaySettings.swift
    info:
      path: mac/faBolusMacWidgets/Info.plist
      properties:
        AppGroupIdentifier: $(TeamIdentifierPrefix)group.$(APP_BUNDLE_ID)
        CFBundleDisplayName: faBolus
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: mac/faBolusMacWidgets/faBolusMacWidgets.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - $(TeamIdentifierPrefix)group.$(APP_BUNDLE_ID)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID).mac.widgets
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic

schemes:
  # Watch-only scheme for CI: builds the watchOS app + complication (and their SPM deps) WITHOUT the
  # iOS faBolus app, so it doesn't require Garmin's ConnectIQ SDK (not available in CI). Catches
  # watchOS build breakage — e.g. a watchOS-only WidgetKit family used without an os() guard.
  WatchCI:
    build:
      targets:
        faBolusWatch: all
