site_name: faBolus
site_description: faBolus — an iPhone, Apple Watch, Garmin, and Mac remote for insulin pumps; currently supports the Tandem t:slim X2 / Mobi. Built by Zev and Tia in tandem.
site_url: https://fabolus.org/
repo_url: https://github.com/faBolus-app/faBolus
repo_name: faBolus-app/faBolus
copyright: >-
  Built by Zev and Tia in tandem · faBolus is an independent, open-source project in development
  for experimental use — not FDA-cleared; you assume all responsibility. Not affiliated with
  Tandem Diabetes Care or Dexcom.

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/water
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle: { icon: material/weather-night, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle: { icon: material/weather-sunny, name: Switch to light mode }
  features:
    # Stripe-style persistent left sidebar (no top tabs)
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Link to this section
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Get started:
      - Safety first: safety.md
      - What you'll need: requirements.md
      - How it works: architecture.md
  - Build it yourself:
      - Overview: build/index.md
      - 1 · Apple account: build/apple-developer.md
      - 2 · Install Xcode: build/xcode.md
      - 3 · Put it on your iPhone: build/build-app.md
      - 4 · Add the Apple Watch: build/apple-watch-build.md
      - 5 · Add a Garmin: build/garmin-build.md
      - Advanced (command line): build/advanced.md
      - Keeping the app running: build/updating.md
  - Set up & pair:
      - Pairing your pump: setup/pairing.md
  - Using the app:
      - Dashboard & status: operate/status.md
      - Bolus & cancel: operate/bolus.md
      - Alerts & alarms: operate/alerts.md
      - Eating nudges: operate/eating-nudges.md
      - CGM failover: operate/cgm-failover.md
      - Activity & sleep automation: operate/activity-sleep-automation.md
      - Child (locked) mode: operate/child-mode.md
      - Backup & restore: operate/backup-restore.md
  - Customize:
      - Settings & options: customize/settings.md
      - Siri & Shortcuts: customize/shortcuts.md
  - Remotes:
      - Apple Watch: remotes/apple-watch.md
      - Garmin: remotes/garmin.md
      - Mac menu bar: remotes/mac.md
      - iPhone remote: remotes/phone-remote.md
      - iPhone widgets: remotes/iphone-widgets.md
  - Help:
      - Troubleshooting: troubleshoot.md
      - FAQ: faq.md
      - Glossary: glossary.md
      - Send feedback: feedback.md
