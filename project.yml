name: ControlX2
options:
  bundleIdPrefix: com.zgranowitz.controlx2
  createIntermediateGroups: true

packages:
  PumpX2Kit:
    # Local path to Repo 1. Pin to a released version once PumpX2Kit tags v0.1.0.
    path: ../PumpX2Kit
  ConnectIQ:
    # Garmin Connect IQ Mobile SDK for iOS (binary xcframework). Not committed (Garmin
    # license). Place it at ~/Code/vendor/connectiq-companion-app-sdk-ios-1.8.0 (see
    # garmin/README.md). Path is relative to this repo.
    path: ../../vendor/connectiq-companion-app-sdk-ios-1.8.0

targets:
  # iOS host app — owns the pump connection (PumpX2Kit) and the Loop-style HUD.
  ControlX2:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ios/ControlX2
      - Shared
    dependencies:
      - package: PumpX2Kit
        product: PumpX2Messages
      - package: PumpX2Kit
        product: PumpX2Auth
      - package: PumpX2Kit
        product: PumpX2BLE
      - package: ConnectIQ
        product: ConnectIQ
    info:
      path: ios/ControlX2/Info.plist
      properties:
        NSBluetoothAlwaysUsageDescription: "ControlX2 connects to a Tandem test pump over Bluetooth to read status and deliver bench (saline) boluses."
        UILaunchScreen: {}
        # Garmin Connect IQ companion messaging: our custom callback scheme + querying the
        # Garmin Connect Mobile app.
        LSApplicationQueriesSchemes: [gcm-ciq]
        CFBundleURLTypes:
          - CFBundleURLName: com.zgranowitz.controlx2.ciq
            CFBundleURLSchemes: [controlx2ciq]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zgranowitz.controlx2
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"

  # watchOS remote — a thin Loop-style remote (dial-to-bolus). Never touches the pump; relays
  # commands to the iPhone host over WatchConnectivity (double-confirm).
  ControlX2Watch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - watch/ControlX2Watch
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zgranowitz.controlx2.watch
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "4"
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "Relays bolus commands to the ControlX2 iPhone app."
