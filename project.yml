name: ControlX2
options:
  bundleIdPrefix: com.zgranowitz.controlx2
  createIntermediateGroups: true

packages:
  PumpX2Kit:
    # Local path to Repo 1. Pin to a released version once PumpX2Kit tags v0.1.0.
    path: ../PumpX2Kit
  ConnectIQ:
    # Garmin Connect IQ Mobile SDK for iOS (binary xcframework). Not committed (Garmin
    # license). Place it at ~/Code/vendor/connectiq-companion-app-sdk-ios-1.8.0 (see
    # garmin/README.md). Path is relative to this repo.
    path: ../../vendor/connectiq-companion-app-sdk-ios-1.8.0

targets:
  # iOS host app — owns the pump connection (PumpX2Kit) and the Loop-style HUD.
  ControlX2:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ios/ControlX2
      - Shared
    dependencies:
      - package: PumpX2Kit
        product: PumpX2Messages
      - package: PumpX2Kit
        product: PumpX2Auth
      - package: PumpX2Kit
        product: PumpX2BLE
      - package: ConnectIQ
        product: ConnectIQ
      # Embeds the WidgetKit extension (Lock Screen + Home Screen widgets).
      - target: ControlX2Widgets
      # Embeds the watchOS companion app so it installs to the paired watch with the phone app.
      - target: ControlX2Watch
        embed: true
    entitlements:
      path: ios/ControlX2/ControlX2.entitlements
      properties:
        # Shared container the app writes and the widgets read.
        com.apple.security.application-groups: [group.com.zgranowitz.controlx2]
    info:
      path: ios/ControlX2/Info.plist
      properties:
        # Garmin Connect builds its "select devices for <app>" screen from CFBundleDisplayName;
        # without it, showDeviceSelection() often opens GCM with no picker.
        CFBundleDisplayName: ControlX2
        # How Siri should pronounce/recognize the app name in App Shortcut phrases ("… in <name>").
        # "ControlX2" is hard for Siri to parse, so provide a spoken name + alternatives the user
        # can say instead ("… in Control X2 / Pump Remote / Tandem Remote").
        CFBundleSpokenName: "Control X2"
        # iOS allows at most 3 alternative names.
        INAlternativeAppNames:
          - INAlternativeAppNameKey: "Control X2"
          - INAlternativeAppNameKey: "Pump Remote"
          - INAlternativeAppNameKey: "Tandem Remote"
        NSBluetoothAlwaysUsageDescription: "ControlX2 connects to a Tandem test pump over Bluetooth to read status and deliver bench (saline) boluses."
        # Keep the pump BLE connection alive in the background so a bolus relayed from the watch
        # goes through without the app being in the foreground.
        UIBackgroundModes: [bluetooth-central]
        UILaunchScreen: {}
        # Garmin Connect IQ companion messaging: our custom callback scheme + querying the
        # Garmin Connect Mobile app.
        LSApplicationQueriesSchemes: [gcm-ciq]
        CFBundleURLTypes:
          - CFBundleURLName: com.zgranowitz.controlx2.ciq
            CFBundleURLSchemes: [controlx2ciq]
          # Deep links from the widgets (controlx2://bolus, controlx2://open).
          - CFBundleURLName: com.zgranowitz.controlx2.deeplink
            CFBundleURLSchemes: [controlx2]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zgranowitz.controlx2
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"

  # watchOS companion app — embedded in the iPhone app so it installs to the paired watch with it.
  # (The glucose complication extension is temporarily NOT embedded: it needs the App Group
  # registered on the watch App IDs, which isn't done yet. Re-add ControlX2WatchWidgets + the App
  # Group entitlement once that capability is enabled in Xcode.)
  ControlX2Watch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - watch/ControlX2Watch
      - Shared
    dependencies:
      # Direct-to-pump support (independent watch, Phase 1: pairing). PumpX2Kit builds for watchOS.
      - package: PumpX2Kit
        product: PumpX2Messages
      - package: PumpX2Kit
        product: PumpX2Auth
      - package: PumpX2Kit
        product: PumpX2BLE
    info:
      path: watch/ControlX2Watch/Info.plist
      properties:
        CFBundleDisplayName: ControlX2
        WKApplication: true
        # Marks this as the companion of the iPhone app so it installs alongside it.
        WKCompanionAppBundleIdentifier: com.zgranowitz.controlx2
        NSBluetoothAlwaysUsageDescription: "ControlX2 connects to a Tandem test pump over Bluetooth to read status and deliver bench (saline) boluses."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zgranowitz.controlx2.watch
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "4"

  # watchOS widget extension — the glucose watch-face complication. Reads the snapshot the watch
  # app publishes to the shared App Group; never touches Bluetooth.
  ControlX2WatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - watch/ControlX2WatchWidgets
      - path: Shared/WidgetShared.swift
    info:
      path: watch/ControlX2WatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: ControlX2
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: watch/ControlX2WatchWidgets/ControlX2WatchWidgets.entitlements
      properties:
        com.apple.security.application-groups: [group.com.zgranowitz.controlx2]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zgranowitz.controlx2.watch.widgets
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "4"

  # WidgetKit extension — Lock Screen (accessory) + Home Screen widgets + tap-to-bolus. Reads
  # the snapshot the app publishes to the shared App Group; never touches Bluetooth itself.
  ControlX2Widgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ios/ControlX2Widgets
      - path: Shared/WidgetShared.swift
    info:
      path: ios/ControlX2Widgets/Info.plist
      properties:
        CFBundleDisplayName: ControlX2
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: ios/ControlX2Widgets/ControlX2Widgets.entitlements
      properties:
        com.apple.security.application-groups: [group.com.zgranowitz.controlx2]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zgranowitz.controlx2.widgets
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
