name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    name: faBolusCore tests + contract drift
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # The Swift RemoteCommand mirror must not drift from schema/command.schema.json.
      - name: Contract drift check
        run: ./scripts/check-schema-drift.sh

      # Provenance chain (audit L-01): every vendored/local package must carry a LICENSE + an SBOM row.
      - name: SBOM / license provenance check
        run: ./scripts/check-sbom.sh

      # The stable contracts + models have no pump/UI dependencies, so they test fast on macOS.
      - name: faBolusCore unit tests
        run: swift test --package-path Packages/faBolusCore

  ios-build:
    name: iOS app build (TandemBackend / AppModel / widgets)
    runs-on: macos-15
    steps:
      # Two-level checkout so the project's relative package paths resolve (see watch-build).
      - name: Checkout faBolus
        uses: actions/checkout@v4
        with:
          path: repos/faBolus

      - name: Checkout PumpX2Kit (local package dependency)
        uses: actions/checkout@v4
        with:
          repository: faBolus-app/PumpX2Kit
          submodules: recursive
          path: repos/PumpX2Kit

      - name: Install XcodeGen
        run: brew install xcodegen

      # Generate with the credential-gated pieces stripped (no private Nudge SDK, no Garmin SDK), then
      # build the full iOS app for the Simulator. This is the audit-T-01 gap: the iOS app — TandemBackend
      # (signed bolus flow, transaction serialization), AppModel.remoteDeliver, the widget receiver, and
      # the pairing hosts — was never compiled in CI before, only faBolusCore + the watch.
      - name: Generate the Xcode project (no private SDK, no Garmin)
        working-directory: repos/faBolus
        run: FABOLUS_NUDGE=0 FABOLUS_GARMIN=0 ./scripts/generate-project.sh

      - name: Build iOS app (Simulator, signing off)
        working-directory: repos/faBolus
        run: |
          set -o pipefail
          xcodebuild -project faBolus.xcodeproj -scheme faBolus \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug CODE_SIGNING_ALLOWED=NO build

  watch-build:
    name: watchOS app + complication build
    runs-on: macos-15
    steps:
      # Two-level checkout so the project's relative package paths resolve:
      #   repos/faBolus/../PumpX2Kit  and  repos/faBolus/../../vendor/<ConnectIQ>
      - name: Checkout faBolus
        uses: actions/checkout@v4
        with:
          path: repos/faBolus

      - name: Checkout PumpX2Kit (local package dependency)
        uses: actions/checkout@v4
        with:
          repository: faBolus-app/PumpX2Kit
          submodules: recursive
          path: repos/PumpX2Kit

      - name: Install XcodeGen
        run: brew install xcodegen

      # Generate via the project script with the optional, credential-gated pieces stripped: the private
      # faBolusNudge SDK (CI can't clone it) and Garmin's ConnectIQ SDK (not committed — license). This is
      # the same open-source build path an external contributor without those gets; the watch app links
      # neither, so the WatchCI scheme builds cleanly. See scripts/generate-project.sh.
      - name: Generate the Xcode project (no private SDK, no Garmin)
        working-directory: repos/faBolus
        run: FABOLUS_NUDGE=0 FABOLUS_GARMIN=0 ./scripts/generate-project.sh

      # Builds the watchOS app + glucose complication (and their SPM deps) via the WatchCI scheme,
      # which excludes the iOS app so ConnectIQ isn't needed. Catches watchOS build breakage.
      - name: Build watch app + complication
        working-directory: repos/faBolus
        run: |
          set -o pipefail
          xcodebuild -project faBolus.xcodeproj -scheme WatchCI \
            -destination 'generic/platform=watchOS Simulator' \
            -configuration Debug CODE_SIGNING_ALLOWED=NO build
