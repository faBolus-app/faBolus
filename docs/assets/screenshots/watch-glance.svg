<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" role="img" aria-label="Screenshot placeholder: Apple Watch glance">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f9fc"/>
      <stop offset="1" stop-color="#eef1ff"/>
    </linearGradient>
    <pattern id="p" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0v24" fill="none" stroke="#dfe4ee" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)"/>
  <rect width="100%" height="100%" fill="url(#p)"/>
  <g text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif">
    <text x="50%" y="43%" font-size="46">⌚️</text>
    <text x="50%" y="55%" font-size="16" font-weight="700" fill="#0a2540">Screenshot placeholder</text>
    <text x="50%" y="63%" font-size="13" fill="#635bff" font-weight="600">Apple Watch glance</text>
    <text x="50%" y="92%" font-size="10" fill="#8a95a6">replace with a real screenshot</text>
  </g>
</svg>
